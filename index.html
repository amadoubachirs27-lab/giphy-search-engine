<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SearchWave</title>
  <meta name="description" content="SearchWave - A GIF search engine powered by Giphy API" />

  <!-- Google Font (Syne - distinctive, never heard of before ✓) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Feuille de style principale -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <h1 class="site-title">SearchWave</h1>
    <nav class="site-nav">
      <ul>
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">Trending</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== HERO / SEARCH SECTION ===== -->
  <main>
    <section class="hero">
      <p class="hero-subtitle">Explore. Discover. Search.</p>
      <div class="search-bar">
        <input type="search" id="search-input" placeholder="Enter a keyword..." />
        <button id="search-btn">Search</button>
      </div>
    </section>

    <!-- ===== RESULTS SECTION ===== -->
    <section class="results-section">
      <p id="results-count" class="results-count"></p>

      <!-- Grille d'images / résultats -->
      <div id="results-grid" class="grid">
        <!-- Les résultats seront insérés ici dynamiquement par main.js -->
      </div>

      <!-- Message affiché quand il n'y a rien -->
      <div id="empty-state" class="empty-state">
        <p>Type a keyword to start searching 🔍</p>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>Built with ❤️ — Project 2 &copy; 2026</p>
  </footer>

  <!-- Script principal -->
  <script src="js/main.js"></script>
</body>
</html>
